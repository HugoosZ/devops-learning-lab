apiVersion: apps/v1 # La version va a cambiar depende del tipo de Recurso (En este caso Deployment)
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: dressy/devops-backend:2df03e9eec8c0d16dd3730891c75b6630cdea418

          imagePullPolicy: Always
          #image: frontend:latest
          #imagePullPolicy: Never
          ports:
            - containerPort: 3001
