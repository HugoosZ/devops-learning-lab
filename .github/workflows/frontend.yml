name: Build and Push Frontend

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'    # Solo se activa si se cambia algo en la carpeta frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-frontend:${{ github.sha }}

      - name: Update Kubernetes resources
        run: |
          # Instalamos kustomize o usamos sed para un cambio rápido
          cd k8s/frontend
          sed -i "s|image: dressy/devops-frontend:.*|image: dressy/devops-backend:${{ github.sha }}|g" deployment.yaml
          
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/deployment.yaml
          git commit -m "chore: update backend image to ${{ github.sha }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}