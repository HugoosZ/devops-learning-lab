name: Build and Push Frontend

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'    # Solo se activa si se cambia algo en la carpeta frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-frontend:${{ github.sha }}

      - name: Update Kubernetes resources
        run: |
          cd k8s/frontend
          # Este sed es más agresivo: busca cualquier cosa que diga devops-frontend y le pone el tag
          sed -i "s|image: .*devops-frontend.*|image: dressy/devops-frontend:${{ github.sha }}|g" deployment.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/frontend/deployment.yaml
          # El "|| true" evita que el workflow falle si no hay cambios
          git commit -m "chore: update frontend image to ${{ github.sha }}" || echo "No hay cambios nuevos"
          git push || echo "Nada que empujar"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}