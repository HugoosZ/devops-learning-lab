apiVersion: apps/v1 # La version va a cambiar depende del tipo de Recurso (En este caso Deployment)
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: dressy/devops-backend:ff2d6378965cbbb17dd4e36b9c230701121d37cc
          imagePullPolicy: Always
          #image: frontend:latest
          #imagePullPolicy: Never
          ports:
            - containerPort: 3001
